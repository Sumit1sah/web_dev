<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table ,tr,td,th{
            border: 1px solid black;
            border-collapse:collapse ;
        }
        caption{
            border: 1px solid black;
        }
    </style>
</head>
<body>
    
    <table>
        <caption>My first saving</caption>
        <thead>
         <tr>
            <th>month </th>
            <th>saving</th>
        </tr>   
        </thead>
        <tbody>
         <tr>
            <td>january</td>
            <td>100</td>
        </tr>
        <tr>
            <td>february</td>
            <td>300</td>
        </tr>
        <tr>
            <td>march</td>
            <td>400</td>
        </tr>   
        </tbody>
        
        <tfoot>
           <tr>
            <td>Total</td>
            <td>800</td>
        </tr>  
        </tfoot>
       
    </table>
</body>
</html>
